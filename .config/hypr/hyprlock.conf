# =========================
# BACKGROUND
# =========================

background {
    monitor =
    path = screenshot
    blur_passes = 2
    blur_size = 6
    brightness = 0.7
}

# =========================
# GENERAL
# =========================

general {
    disable_loading_bar = true
    hide_cursor = true
}

# =========================
# PASSWORD INPUT
# =========================

input-field {
    monitor =
    size = 260, 55
    outline_thickness = 2

    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true

    outer_color = rgba(ffffffff)   # branco
    inner_color = rgba(131313ff)   # fundo
    font_color  = rgba(ffffffff)   # branco

    rounding = 10
    fade_on_empty = false

    placeholder_text = <span foreground="##B8B8B8">password...</span>

    position = 0, -80
    halign = center
    valign = center
}

# =========================
# TIME
# =========================

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(ffffffff)   # branco

    font_size = 72
    font_family = JetBrainsMono Nerd Font

    position = 0, 120
    halign = center
    valign = center
}

# =========================
# DATE
# =========================

label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%d/%m/%Y')"
    color = rgba(b8b8b8ff)   # cinza claro

    font_size = 20
    font_family = JetBrainsMono Nerd Font

    position = 0, 60
    halign = center
    valign = center
}
